name: CI / Build / Release

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]      # сборка релиза только на семвер-тегах
  pull_request:
    branches: [ main ]
  workflow_dispatch:            # ручной запуск из UI GitHub

jobs:
  # =================================================================
  # LINT — быстрая проверка стиля на Ubuntu
  # =================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check main.py tests/

  # =================================================================
  # TEST — pytest для чистых функций (быстро, без GUI/сети)
  # =================================================================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run pytest
        run: pytest

  # =================================================================
  # BUILD — единый Windows .exe, только после lint+test
  # =================================================================
  build-windows:
    needs: [ lint, test ]
    runs-on: windows-latest
    permissions:
      contents: write           # нужно для создания Release

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller==6.10.*

    - name: Build single-file EXE
      shell: pwsh
      run: |
        # --onefile: всё внутри одного бинарника, всегда portable.
        # --noupx: не давим UPX-ом — это снижает false-positive у AV.
        # --exclude-module: явно вырезаем ненужные тяжёлые пакеты,
        #     которые PyInstaller иногда тащит транзитивно.
        $pyiArgs = @(
            '--onefile',
            '--windowed',
            '--noupx',
            '--name', 'Hua4GMon',
            '--exclude-module', 'pytest',
            '--exclude-module', 'numpy',
            '--exclude-module', 'matplotlib',
            '--exclude-module', 'PIL',
            '--exclude-module', 'pandas',
            '--exclude-module', 'scipy'
        )
        if (Test-Path 'icon.ico') {
            $pyiArgs += '--icon=icon.ico'
        }
        $pyiArgs += 'main.py'
        pyinstaller @pyiArgs

    - name: Stage release assets
      shell: pwsh
      run: |
        # dist/Hua4GMon.exe — единственный обязательный файл.
        # Считаем SHA256, копируем README и LICENSE рядом для удобства.
        $version = if ($env:GITHUB_REF -like 'refs/tags/v*') {
          $env:GITHUB_REF -replace 'refs/tags/',''
        } else {
          "dev-$(Get-Date -Format yyyyMMdd-HHmmss)"
        }
        $exeName = "Hua4GMon-$version.exe"
        Copy-Item dist/Hua4GMon.exe $exeName

        $hash = (Get-FileHash $exeName -Algorithm SHA256).Hash
        "$hash  $exeName" | Out-File -Encoding ascii "$exeName.sha256"

        "EXE_NAME=$exeName" | Out-File -FilePath $env:GITHUB_ENV -Append
        "EXE_HASH=$hash"    | Out-File -FilePath $env:GITHUB_ENV -Append
        "EXE_SIZE=$([math]::Round((Get-Item $exeName).Length / 1MB, 1)) МБ" |
            Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Upload artifact (для push и PR)
      uses: actions/upload-artifact@v4
      with:
        name: Hua4GMon-Windows
        path: |
          ${{ env.EXE_NAME }}
          ${{ env.EXE_NAME }}.sha256

    - name: Create GitHub Release (только на тегах vX.Y.Z)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.EXE_NAME }}
          ${{ env.EXE_NAME }}.sha256
          README.md
          LICENSE
        body: |
          **Hua4GMon ${{ github.ref_name }}** — portable Windows .exe.

          Просто скачайте `${{ env.EXE_NAME }}` и запустите. Установка
          не требуется, ничего не пишется на диск.

          **Размер:** ${{ env.EXE_SIZE }}
          **SHA256:**
          ```
          ${{ env.EXE_HASH }}
          ```

          **⚠ Windows SmartScreen:** при первом запуске неподписанного
          .exe Windows может предупредить «Неизвестный издатель».
          Это нормально. Жмите «Подробнее» → «Выполнить в любом случае».
          См. README → раздел Windows SmartScreen.

          **⚠ Если Windows ругается на «не удаётся открыть» .exe**,
          выполните в PowerShell:
          ```powershell
          Unblock-File .\${{ env.EXE_NAME }}
          ```

          Полный список изменений: [CHANGELOG.md](CHANGELOG.md).
