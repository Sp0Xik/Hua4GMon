name: Build Android APK

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  build-android:
    # Фиксируем 22.04: там есть libtinfo5, нужный Android SDK build-tools
    # (aidl/aapt), и стабильный набор пакетов для python-for-android.
    # Не используем сторонний buildozer-action — его Docker-образ ломается
    # на устаревшем PPA openjdk-r (apt 404). Ставим всё вручную.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Десктопный main.py — Tkinter-версия, она НЕ должна быть точкой
      # входа на Android. Собираем в отдельной папке, где android_main.py
      # становится main.py. Десктопный main.py в репозитории не трогаем.
      - name: Stage Android sources
        run: |
          mkdir -p build-android
          cp android_main.py build-android/main.py
          cp -r core build-android/core
          cp -r assets build-android/assets
          cp buildozer.spec build-android/buildozer.spec
          ls -la build-android

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev build-essential ccache

      - name: Install buildozer + cython
        run: |
          python -m pip install --upgrade pip
          # Фиксированные версии: buildozer 1.5.0 совместим с p4a
          # v2024.01.21 (задан в buildozer.spec) и NDK 25b. Свежий
          # buildozer тянул бы Python 3.14 + NDK r28c, где ломается pyjnius.
          pip install "buildozer==1.5.0"
          pip install "cython==0.29.36"

      # Кэшируем тяжёлые скачивания SDK/NDK между сборками, иначе каждый
      # прогон качает несколько ГБ и занимает 30-40 минут.
      # Префикс v2 — чтобы сбросить старый кэш от сломанных сборок
      # (там осел NDK r28c / Python 3.14).
      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v2-${{ hashFiles('build-android/buildozer.spec') }}
          restore-keys: |
            buildozer-v2-

      - name: Build APK (debug)
        working-directory: build-android
        run: |
          export ANDROID_ACCEPT_SDK_LICENSE=yes
          # yes | — автоприём лицензий SDK при первой загрузке
          yes | buildozer -v android debug

      - name: Locate built APK
        id: apk
        run: |
          APK=$(find build-android/bin -name '*.apk' | head -n1)
          echo "Found APK: $APK"
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hua4GMon-Android
          path: ${{ steps.apk.outputs.apk_path }}

      - name: Attach APK to Release (на тегах vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}
