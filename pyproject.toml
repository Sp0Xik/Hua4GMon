[tool.ruff]
target-version = "py310"
line-length = 100
exclude = ["dist", "build", ".venv", ".buildozer", "build-android"]

[tool.ruff.lint]
# Набор правил:
#   E/W  — pycodestyle (стиль)
#   F    — pyflakes (unused, undefined)
#   I    — isort (порядок импортов)
#   B    — bugbear (поведенческие баги: mutable defaults и т.п.)
#   UP   — pyupgrade (современный синтаксис для целевого Python)
#   SIM  — flake8-simplify (упрощения)
#   C4   — comprehensions (лишние генераторы/словари)
select = ["E", "W", "F", "I", "B", "UP", "SIM", "C4"]
ignore = [
    "E501",   # длина строки — переносим по смыслу, не по символам
    "B008",   # вызовы в аргументах по умолчанию (нужно для Optional)
]

[tool.ruff.lint.isort]
known-first-party = ["main", "android_main", "core"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]
# android_main: крипто-алиас Cryptodome->Crypto должен выполниться ДО
# импорта huawei_lte_api, поэтому часть импортов идёт после кода (E402).
"android_main.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
