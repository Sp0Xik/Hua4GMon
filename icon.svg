<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Фон: скруглённый квадрат, фирменный синий градиент -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="1" stop-color="#0050a0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Мачта антенны -->
  <rect x="244" y="196" width="24" height="200" rx="6" fill="#ffffff"/>
  <!-- Основание -->
  <rect x="206" y="388" width="100" height="20" rx="8" fill="#ffffff"/>

  <!-- Излучающая точка -->
  <circle cx="256" cy="188" r="26" fill="#ffffff"/>

  <!-- Волны сигнала (дуги) слева и справа -->
  <g fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" opacity="0.95">
    <path d="M196 150 A 84 84 0 0 0 196 226"/>
    <path d="M316 150 A 84 84 0 0 1 316 226"/>
  </g>
  <g fill="none" stroke="#bfe0ff" stroke-width="14" stroke-linecap="round" opacity="0.8">
    <path d="M160 120 A 136 136 0 0 0 160 256"/>
    <path d="M352 120 A 136 136 0 0 1 352 256"/>
  </g>

  <!-- Подпись 4G -->
  <text x="256" y="476" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="84"
        font-weight="bold" fill="#ffffff">4G</text>
</svg>
